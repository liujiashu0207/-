<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>科研监督驾驶舱</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #fff;
      --text: #0f172a;
      --sub: #64748b;
      --border: #e2e8f0;
      --ok: #16a34a;
      --warn: #d97706;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(1100px, 94vw);
      margin: 24px auto 36px;
      display: grid;
      gap: 12px;
    }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .hero h1 { margin: 0; font-size: 28px; }
    .hero p { margin: 8px 0 0; color: var(--sub); line-height: 1.7; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #f8fafc;
    }
    .label { font-size: 12px; color: var(--sub); }
    .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 10px 8px;
      vertical-align: top;
    }
    th { font-size: 13px; color: var(--sub); }
    .chip {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid transparent;
      display: inline-block;
    }
    .ok { background: #f0fdf4; color: #166534; border-color: #86efac; }
    .warn { background: #fff7ed; color: #9a3412; border-color: #fdba74; }
    .danger { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
    .cmd {
      font-family: Consolas, monospace;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      color: #334155;
      display: inline-block;
      word-break: break-all;
    }
    .footer {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.7;
    }
    @media (max-width: 880px) {
      .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
      table { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>科研监督驾驶舱</h1>
      <p>
        这是你新增的“第三个抓手”：不是看我说了什么，而是看证据是否达标。<br />
        你每次只需要看 <b>通过率、红色项、命令复核</b> 三件事，就能判断我有没有乱搞、有没有发文价值。
      </p>
    </section>

    <section class="card stats">
      <div class="stat">
        <div class="label">审计项总数</div>
        <div class="value" id="total">0</div>
      </div>
      <div class="stat">
        <div class="label">已通过</div>
        <div class="value" id="passed">0</div>
      </div>
      <div class="stat">
        <div class="label">通过率</div>
        <div class="value" id="rate">0%</div>
      </div>
      <div class="stat">
        <div class="label">发文支持度</div>
        <div class="value" id="publishScore">0/100</div>
      </div>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th style="width: 24%;">审计维度</th>
            <th style="width: 26%;">证据文件</th>
            <th style="width: 24%;">复核命令</th>
            <th style="width: 14%;">状态</th>
            <th style="width: 12%;">人工确认</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <section class="card footer">
      使用方法：<br />
      1）先看红色项并让助手优先修复；2）每修一项就点一次“人工确认”；3）通过率低于80%时，禁止推进到投稿阶段。<br />
      建议每晚固定复核一次，作为你监督我科研质量的强制流程。
    </section>
  </main>

  <script>
    const STORAGE_KEY = "research-audit-cockpit-v1";
    const CHECKS = [
      {
        id: "data_full",
        name: "数据完整性（满样本）",
        evidence: "results/exp_raw_records.csv | results/exp_sampling_trace.csv",
        command: "python code/experiments/run_b_route_experiments.py --sizes 20,40,80,100 --ratios 0.3,0.7 --repeats 30 --seed 42",
        status: "ok",
        weight: 20
      },
      {
        id: "reproducibility",
        name: "可复现性（多种子）",
        evidence: "results/exp_seed42_*.csv, exp_seed43_*.csv, exp_seed44_*.csv",
        command: "python code/experiments/run_b_route_experiments.py --out_prefix exp_seed42 ...",
        status: "ok",
        weight: 20
      },
      {
        id: "statistics",
        name: "统计严谨性（置换+FDR）",
        evidence: "results/exp_multiseed_significance.csv | docs/统计检验报告_exp_multiseed_v1.md",
        command: "python code/experiments/analyze_significance.py --raw_file exp_multiseed_raw_records.csv --out_prefix exp_multiseed",
        status: "ok",
        weight: 20
      },
      {
        id: "paper_alignment",
        name: "文稿一致性（结论-证据绑定）",
        evidence: "docs/结论-证据对照表_v1.md | docs/结果与讨论章节草稿_v1.md",
        command: "手工核对：路径长度不得写显著提升",
        status: "warn",
        weight: 20
      },
      {
        id: "benchmark_gap",
        name: "对标差距（JPS实现/实机验证）",
        evidence: "docs/对标评审_科学严谨性_v1.md",
        command: "手工核对：是否已补标准JPS或ROS验证",
        status: "danger",
        weight: 20
      }
    ];

    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    const rows = document.getElementById("rows");

    function chipCls(status) {
      if (status === "ok") return ["ok", "通过"];
      if (status === "warn") return ["warn", "待改进"];
      return ["danger", "高风险"];
    }

    function render() {
      rows.innerHTML = "";
      let passed = 0;
      let score = 0;
      CHECKS.forEach((c) => {
        const manual = !!state[c.id];
        const [cls, text] = chipCls(c.status);
        if (manual) {
          passed += 1;
          score += c.weight;
        }
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><b>${c.name}</b></td>
          <td><code>${c.evidence}</code></td>
          <td><span class="cmd">${c.command}</span></td>
          <td><span class="chip ${cls}">${text}</span></td>
          <td><label><input type="checkbox" data-id="${c.id}" ${manual ? "checked" : ""} /> 已核验</label></td>
        `;
        rows.appendChild(tr);
      });
      const total = CHECKS.length;
      const rate = Math.round((passed / total) * 100);
      document.getElementById("total").textContent = total;
      document.getElementById("passed").textContent = passed;
      document.getElementById("rate").textContent = `${rate}%`;
      document.getElementById("publishScore").textContent = `${score}/100`;

      document.querySelectorAll("input[type='checkbox'][data-id]").forEach((cb) => {
        cb.addEventListener("change", (e) => {
          const id = e.target.getAttribute("data-id");
          state[id] = e.target.checked;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
