<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9e9e9" stroke-width="1"/>
    </pattern>
    <style>
      .label { font-family: Arial, sans-serif; font-size: 20px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 16px; fill: #333; }
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #1f2937; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#ffffff"/>
  <rect x="50" y="80" width="900" height="680" fill="url(#grid)" stroke="#cfcfcf" stroke-width="2"/>

  <!-- Title -->
  <text x="50" y="50" class="title">Mobile Robot Navigation Route Sketch (A* / DWA / RRT)</text>

  <!-- Obstacles -->
  <rect x="180" y="180" width="160" height="120" fill="#111827"/>
  <rect x="430" y="140" width="120" height="220" fill="#111827"/>
  <rect x="680" y="200" width="170" height="110" fill="#111827"/>
  <rect x="280" y="430" width="220" height="130" fill="#111827"/>
  <rect x="620" y="430" width="120" height="220" fill="#111827"/>
  <circle cx="820" cy="540" r="65" fill="#111827"/>

  <!-- Dynamic risk zones -->
  <circle cx="560" cy="520" r="95" fill="#ef4444" opacity="0.20"/>
  <circle cx="760" cy="350" r="75" fill="#ef4444" opacity="0.20"/>
  <text x="690" y="640" class="small">Red translucent circles: dynamic risk zones</text>

  <!-- Start and Goal -->
  <circle cx="110" cy="700" r="16" fill="#10b981"/>
  <text x="140" y="707" class="label">START</text>
  <circle cx="900" cy="120" r="16" fill="#ef4444"/>
  <text x="930" y="127" class="label">GOAL</text>

  <!-- A* path (blue, cleaner) -->
  <polyline points="110,700 200,640 250,610 370,610 520,610 560,560 590,470 610,390 700,330 780,300 840,220 900,120"
            fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- DWA path (orange, local zig-zag) -->
  <polyline points="110,700 170,670 230,650 280,620 340,620 390,600 440,620 500,600 540,560 520,520 560,500 600,460 640,430 690,390 730,350 760,320 810,260 860,200 900,120"
            fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RRT path (purple, more random turns) -->
  <polyline points="110,700 150,620 220,600 260,540 240,500 300,470 350,430 420,420 470,380 520,340 560,300 620,270 650,230 710,210 750,180 790,150 850,130 900,120"
            fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0"/>

  <!-- Legend box -->
  <rect x="980" y="120" width="190" height="220" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" rx="12"/>
  <text x="1000" y="155" class="label">Legend</text>
  <line x1="1000" y1="190" x2="1080" y2="190" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
  <text x="1090" y="196" class="small">A* (global)</text>
  <line x1="1000" y1="230" x2="1080" y2="230" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <text x="1090" y="236" class="small">DWA (local)</text>
  <line x1="1000" y1="270" x2="1080" y2="270" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
  <text x="1090" y="276" class="small">RRT (sampling)</text>
  <circle cx="1040" cy="315" r="12" fill="#ef4444" opacity="0.35"/>
  <text x="1060" y="320" class="small">Risk zone</text>

  <!-- Obstacle label -->
  <rect x="980" y="370" width="190" height="130" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" rx="12"/>
  <rect x="1000" y="405" width="40" height="26" fill="#111827"/>
  <text x="1050" y="424" class="small">Obstacle</text>
  <circle cx="1020" cy="460" r="10" fill="#10b981"/>
  <text x="1050" y="466" class="small">Start</text>
  <circle cx="1020" cy="490" r="10" fill="#ef4444"/>
  <text x="1050" y="496" class="small">Goal</text>

  <!-- Footer note -->
  <text x="50" y="785" class="small">Note: This is a schematic visualization (not experimental output).</text>
</svg>
